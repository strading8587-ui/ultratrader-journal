<head>

    <style>
        /* --- ULTRATRADER INSPIRED THEME --- */
        :root {
            --bg-base: #000000;
            --bg-app: #09090b;
            --bg-card: #141415;
            --bg-input: #1f1f22;
            --bg-hover: #27272a;
            
            --border-subtle: #27272a;
            --border-focus: #6366f1;
            
            --brand-gradient: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            --brand-solid: #8b5cf6;
            
            --profit: #10b981;
            --profit-glow: rgba(16, 185, 129, 0.2);
            --loss: #f43f5e;
            --loss-glow: rgba(244, 63, 94, 0.2);
            
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-pill: 999px;
            
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 20px rgba(139, 92, 246, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at 50% 0%, #1a1a24 0%, var(--bg-base) 70%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.5;
        }

        /* ... (the entire <style> block you originally had is unchanged) ... */

</head>
<body>

<!-- All your original HTML remains 100% unchanged (header, metrics, cards, calendar, modal, etc.) -->

<div class="app-header">
    <div class="app-logo">U</div>
    <div class="app-title">UltraTrader Journal</div>
</div>

<div class="container">
    <!-- Your full original dashboard HTML (metrics-row, dashboard-grid, log new trade, calendar, etc.) is exactly the same -->
    <!-- I kept every single class, ID, and structure identical -->
</div>

<div id="iosTooltip" class="ut-tooltip"></div>

<div class="modal-overlay" id="modal">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h2 id="modalTitle" style="font-size:20px; font-weight:600; margin-bottom: 24px;">Details</h2>
        <div id="modalContent"></div>
        <div id="noteSection"></div>
    </div>
</div>

<script>
    let trades = [];
    let notesData = {};
    
    const API_URL = 'https://script.google.com/macros/s/YOUR_WEB_APP_URL/exec';   // ←←← REPLACE THIS LINE WITH YOUR WEB APP URL
    
    let selectedCat = 'My Algo'; 
    let selectedSub = 'Nifty';
    let curDate = new Date(new Date().getFullYear(), 3, 1);
    let chart1, gaugeWin, gaugePf;
    const tooltip = document.getElementById('iosTooltip');

    // Default date input
    document.getElementById('dateInput').valueAsDate = curDate;

    // Chart defaults (unchanged)
    Chart.defaults.font.family = "'Inter', sans-serif"; 
    Chart.defaults.color = '#71717a';
    Chart.defaults.plugins.tooltip.backgroundColor = '#141415';
    Chart.defaults.plugins.tooltip.titleColor = '#ffffff';
    Chart.defaults.plugins.tooltip.bodyColor = '#a1a1aa';
    Chart.defaults.plugins.tooltip.borderColor = '#27272a';
    Chart.defaults.plugins.tooltip.borderWidth = 1;
    Chart.defaults.plugins.tooltip.padding = 12;
    Chart.defaults.plugins.tooltip.cornerRadius = 8;
    Chart.defaults.plugins.tooltip.displayColors = false;

    // ====================== GOOGLE SHEETS API ======================
    async function apiGet() {
        const res = await fetch(`${API_URL}?action=getData`);
        if (!res.ok) throw new Error('Network error');
        return await res.json();
    }

    async function apiPost(action, payload = {}) {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, ...payload })
        });
        if (!res.ok) throw new Error('API error');
        return await res.json();
    }

    async function loadData() {
        try {
            const data = await apiGet();
            trades = (data.trades || []).sort((a, b) => new Date(a.date) - new Date(b.date));
            notesData = data.notes || {};
            updateUI();
        } catch (err) {
            console.error(err);
            alert("Could not connect to Google Sheets.\n\n1. Make sure you replaced the API_URL\n2. Check that the web app is deployed as 'Anyone'");
        }
    }

    // ====================== MODIFIED FUNCTIONS ======================
    async function addTrade() {
        const date = document.getElementById('dateInput').value;
        const pnl = parseFloat(document.getElementById('pnlInput').value);
        if (!date || isNaN(pnl)) return alert("Invalid details");

        const newTrade = {
            id: Date.now(),
            date: date,
            category: selectedCat,
            subCategory: (selectedCat === 'My Algo' || selectedCat === 'Tez Algo') ? selectedSub : '-',
            pnl: pnl
        };

        trades.push(newTrade);
        trades.sort((a, b) => new Date(a.date) - new Date(b.date));

        try {
            await apiPost('addTrade', { trade: newTrade });
        } catch (e) {
            console.error(e);
        }

        document.getElementById('pnlInput').value = '';
        updateUI();
    }

    async function del(id) {
        trades = trades.filter(t => t.id !== id);
        try {
            await apiPost('deleteTrade', { id: id });
        } catch (e) {
            console.error(e);
        }
        closeModal();
        updateUI();
    }

    async function saveNoteEntry(d) {
        const val = document.getElementById('modalNote').value;
        if (val.trim() === "") delete notesData[d];
        else notesData[d] = val;

        try {
            await apiPost('saveNotes', { notes: notesData });
        } catch (e) {
            console.error(e);
        }
        closeModal();
        updateUI();
    }

    async function clearAll() {
        if (confirm("Clear all journal data? This action is irreversible.")) {
            trades = [];
            notesData = {};
            try {
                await apiPost('clearAll');
            } catch (e) {
                console.error(e);
            }
            updateUI();
        }
    }

    async function importData(inp) {
        const r = new FileReader();
        r.onload = async (e) => {
            try {
                const d = JSON.parse(e.target.result);
                if (Array.isArray(d)) {
                    trades = d;
                    notesData = {};
                } else {
                    trades = d.trades || [];
                    notesData = d.notes || {};
                }
                trades.sort((a, b) => new Date(a.date) - new Date(b.date));
                await apiPost('import', { trades: trades, notes: notesData });
                updateUI();
            } catch (err) {
                alert('Import failed');
            }
        };
        r.readAsText(inp.files[0]);
    }

    function exportData() {
        const data = { trades: trades, notes: notesData };
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'ultratrader_backup.json';
        a.click();
    }

    // ====================== ORIGINAL FUNCTIONS (unchanged) ======================
    function selectCategory(cat, el) { /* unchanged */ }
    function selectSub(sub, el) { /* unchanged */ }
    function updateUI() { renderTelemetry(); renderGauges(); renderCalendar(); renderCharts(); }
    function renderTelemetry() { /* your original code */ }
    function renderGauges() { /* your original code */ }
    function renderCharts() { /* your original code */ }
    function moveMonth(n) { /* unchanged */ }
    function renderCalendar() { /* unchanged */ }
    function showTooltip(e, d, p) { /* unchanged */ }
    function hideTooltip() { /* unchanged */ }
    function runReport() { /* unchanged */ }
    function openModal(d, i) { /* unchanged */ }
    function closeModal() { /* unchanged */ }

    // ====================== START THE APP ======================
    loadData();   // ← loads data from Google Sheets on page load
</script>
</body>
</html>
